name: Advanced Subtitle Generator with AI

on:
  workflow_dispatch:
    inputs:
      video_source:
        description: 'نحوه دریافت فیلم'
        required: true
        default: 'direct_url'
        type: choice
        options:
          - direct_url
          - github_release
      
      direct_url:
        description: 'لینک مستقیم فیلم'
        required: false
        type: string
        default: ''
      
      release_tag:
        description: 'تگ Release'
        required: false
        type: string
        default: 'latest'
      
      whisper_model:
        description: 'مدل Whisper'
        required: true
        default: 'base'
        type: choice
        options:
          - 'base'
          - 'small'
          - 'medium'
          - 'large-v3'
          - 'turbo'
      
      language_detection:
        description: 'زبان صدا'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'English'
          - 'Persian'
          - 'Spanish'
          - 'French'
          - 'German'
          - 'Japanese'
          - 'Korean'
      
      translate_to:
        description: 'ترجمه به'
        required: false
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'fa'
          - 'en'
          - 'es'
          - 'fr'
          - 'de'
      
      content_type:
        description: 'نوع محتوا'
        required: true
        default: 'movie'
        type: choice
        options:
          - 'movie'
          - 'rap_music'
          - 'anime'
          - 'documentary'
      
      subtitle_format:
        description: 'فرمت خروجی'
        required: true
        default: 'srt'
        type: choice
        options:
          - 'srt'
          - 'ass'
          - 'vtt'

jobs:
  process-subtitle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ========== نصب FFmpeg ==========
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1
      
      # ========== نصب Whisper ==========
      - name: Install Whisper
        run: |
          pip install --upgrade pip
          pip install openai-whisper
          pip install pysrt deep-translator
          echo "✅ Whisper installed"
      
      # ========== دانلود فیلم ==========
      - name: Download video
        id: download
        run: |
          if [ "${{ github.event.inputs.video_source }}" = "direct_url" ]; then
            echo "Downloading from direct URL..."
            curl -L -o input_video.mp4 "${{ github.event.inputs.direct_url }}"
          else
            echo "Downloading from GitHub Release..."
            if [ "${{ github.event.inputs.release_tag }}" = "latest" ]; then
              TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
            else
              TAG="${{ github.event.inputs.release_tag }}"
            fi
            DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | jq -r '.assets[0].browser_download_url')
            curl -L -o input_video.mp4 "$DOWNLOAD_URL"
          fi
          
          if [ ! -f input_video.mp4 ]; then
            echo "Error: Video not downloaded!"
            exit 1
          fi
          echo "✅ Video downloaded"
          ls -lh input_video.mp4
      
      # ========== اجرای Whisper ==========
      - name: Generate subtitle
        id: whisper
        run: |
          MODEL="${{ github.event.inputs.whisper_model }}"
          LANG_INPUT="${{ github.event.inputs.language_detection }}"
          
          echo "Using model: $MODEL"
          
          if [ "$LANG_INPUT" = "auto" ]; then
            whisper input_video.mp4 --model $MODEL --output_format srt --output_dir . --verbose True
          else
            LANG=$(echo $LANG_INPUT | tr '[:upper:]' '[:lower:]')
            whisper input_video.mp4 --model $MODEL --language $LANG --output_format srt --output_dir . --verbose True
          fi
          
          # بررسی فایل خروجی
          echo "Files in directory:"
          ls -la *.srt 2>/dev/null || echo "No SRT files found"
          
          ORIGINAL_SRT=$(ls *.srt 2>/dev/null | head -n 1)
          if [ -z "$ORIGINAL_SRT" ]; then
            echo "Error: No subtitle file generated!"
            exit 1
          fi
          
          echo "original_srt=$ORIGINAL_SRT" >> $GITHUB_OUTPUT
          echo "✅ Subtitle generated: $ORIGINAL_SRT"
          cat "$ORIGINAL_SRT" | head -n 20
      
      # ========== ترجمه ==========
      - name: Translate subtitle
        id: translate
        if: github.event.inputs.translate_to != 'none'
        run: |
          ORIGINAL="${{ steps.whisper.outputs.original_srt }}"
          TARGET="${{ github.event.inputs.translate_to }}"
          TRANSLATED_SRT="translated_${TARGET}.srt"
          
          echo "Translating from $ORIGINAL to $TARGET"
          
          python3 << EOF
          import pysrt
          from deep_translator import GoogleTranslator
          
          input_file = "$ORIGINAL"
          output_file = "$TRANSLATED_SRT"
          target_lang = "$TARGET"
          
          print(f"Reading: {input_file}")
          subs = pysrt.open(input_file)
          print(f"Loaded {len(subs)} subtitles")
          
          translator = GoogleTranslator(source='auto', target=target_lang)
          
          for i, sub in enumerate(subs):
              if sub.text and sub.text.strip():
                  try:
                      translated = translator.translate(sub.text)
                      if translated:
                          sub.text = translated
                  except Exception as e:
                      print(f"Error line {i+1}: {e}")
              if (i+1) % 10 == 0:
                  print(f"Progress: {i+1}/{len(subs)}")
          
          subs.save(output_file)
          print(f"Saved: {output_file}")
          EOF
          
          echo "translated_srt=$TRANSLATED_SRT" >> $GITHUB_OUTPUT
          echo "✅ Translation done"
      
      # ========== تبدیل فرمت ==========
      - name: Convert format
        id: format
        run: |
          FORMAT="${{ github.event.inputs.subtitle_format }}"
          
          # تابع تبدیل
          convert() {
            local INPUT=$1
            local NAME=$(basename "$INPUT" .srt)
            local OUTPUT="${NAME}.${FORMAT}"
            
            if [ "$FORMAT" = "srt" ]; then
              cp "$INPUT" "$OUTPUT"
            elif [ "$FORMAT" = "ass" ]; then
              python3 << EOF
              import pysrt
              subs = pysrt.open("$INPUT")
              with open("$OUTPUT", "w", encoding="utf-8") as f:
                  f.write("[Script Info]\nTitle=Subtitle\nScriptType=v4.00+\n\n[V4+ Styles]\nFormat: Name,Fontname,Fontsize,PrimaryColour,SecondaryColour,OutlineColour,BackColour,Bold,Italic,Underline,StrikeOut,ScaleX,ScaleY,Spacing,Angle,BorderStyle,Outline,Shadow,Alignment,MarginL,MarginR,MarginV,Encoding\nStyle: Default,Arial,40,&H00FFFFFF,&H000000FF,&H00000000,&H00000000,0,0,0,0,100,100,0,0,1,2,0,2,20,20,20,1\n\n[Events]\nFormat: Layer,Start,End,Style,Name,MarginL,MarginR,MarginV,Effect,Text\n")
                  for sub in subs:
                      start = f"{sub.start.hours:01d}:{sub.start.minutes:02d}:{sub.start.seconds:02d}.{sub.start.milliseconds:03d}"
                      end = f"{sub.end.hours:01d}:{sub.end.minutes:02d}:{sub.end.seconds:02d}.{sub.end.milliseconds:03d}"
                      text = sub.text.replace("\n", "\\N")
                      f.write(f"Dialogue: 0,{start},{end},Default,,0,0,0,,{text}\n")
              EOF
            elif [ "$FORMAT" = "vtt" ]; then
              python3 << EOF
              import pysrt
              subs = pysrt.open("$INPUT")
              with open("$OUTPUT", "w", encoding="utf-8") as f:
                  f.write("WEBVTT\n\n")
                  for sub in subs:
                      start = f"{sub.start.hours:02d}:{sub.start.minutes:02d}:{sub.start.seconds:02d}.{sub.start.milliseconds:03d}"
                      end = f"{sub.end.hours:02d}:{sub.end.minutes:02d}:{sub.end.seconds:02d}.{sub.end.milliseconds:03d}"
                      f.write(f"{start} --> {end}\n{sub.text}\n\n")
              EOF
            fi
            echo "$OUTPUT"
          }
          
          # تبدیل فایل اصلی
          ORIG_OUT=$(convert "${{ steps.whisper.outputs.original_srt }}")
          echo "original_output=$ORIG_OUT" >> $GITHUB_OUTPUT
          echo "✅ Original converted: $ORIG_OUT"
          
          # تبدیل فایل ترجمه شده (اگر وجود داشته باشد)
          if [ -n "${{ steps.translate.outputs.translated_srt }}" ]; then
            TRANS_OUT=$(convert "${{ steps.translate.outputs.translated_srt }}")
            echo "translated_output=$TRANS_OUT" >> $GITHUB_OUTPUT
            echo "✅ Translated converted: $TRANS_OUT"
          fi
      
      # ========== پاکسازی ==========
      - name: Cleanup
        run: |
          echo "🧹 Cleaning..."
          rm -f input_video.mp4
          rm -f *.wav 2>/dev/null || true
          rm -f *.mp3 2>/dev/null || true
          echo "✅ Cleanup done"
      
      # ========== آپلود فایل اصلی ==========
      - name: Upload original subtitle
        uses: actions/upload-artifact@v4
        with:
          name: original-subtitle
          path: ${{ steps.format.outputs.original_output }}
          retention-days: 30
      
      # ========== آپلود فایل ترجمه شده ==========
      - name: Upload translated subtitle
        if: steps.format.outputs.translated_output != ''
        uses: actions/upload-artifact@v4
        with:
          name: translated-subtitle
          path: ${{ steps.format.outputs.translated_output }}
          retention-days: 30
      
      # ========== خلاصه ==========
      - name: Summary
        run: |
          echo "## ✅ Done!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Model | ${{ github.event.inputs.whisper_model }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Format | ${{ github.event.inputs.subtitle_format }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ github.event.inputs.language_detection }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.translate_to }}" != "none" ]; then
            echo "| Translation | to ${{ github.event.inputs.translate_to }} ✅ |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from Artifacts below" >> $GITHUB_STEP_SUMMARY
