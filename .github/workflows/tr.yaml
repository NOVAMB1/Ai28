name: Subtitle Generator with AI

on:
  workflow_dispatch:
    inputs:
      video_source:
        description: 'نحوه دریافت فیلم'
        required: true
        default: 'direct_url'
        type: choice
        options:
          - direct_url
          - github_release
      
      direct_url:
        description: 'لینک مستقیم فیلم'
        required: false
        type: string
        default: ''
      
      release_tag:
        description: 'تگ Release'
        required: false
        type: string
        default: 'latest'
      
      whisper_model:
        description: 'مدل Whisper'
        required: true
        default: 'small'
        type: choice
        options:
          - 'tiny'
          - 'base'
          - 'small'
          - 'medium'
          - 'large'
          - 'turbo'
      
      language:
        description: 'زبان صدا'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'en'
          - 'fa'
          - 'ru'
          - 'es'
          - 'fr'
          - 'de'
          - 'ja'
          - 'ko'
          - 'zh'
      
      translate_to:
        description: 'ترجمه به'
        required: false
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'fa'
          - 'en'
          - 'es'
          - 'fr'
          - 'de'

jobs:
  process-subtitle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
      
      - name: Install Whisper
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet openai-whisper
          pip install --quiet pysrt deep-translator
      
      - name: Download video
        id: download
        run: |
          if [ "${{ github.event.inputs.video_source }}" = "direct_url" ]; then
            curl -L -o input_video.mp4 "${{ github.event.inputs.direct_url }}"
          else
            if [ "${{ github.event.inputs.release_tag }}" = "latest" ]; then
              TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
            else
              TAG="${{ github.event.inputs.release_tag }}"
            fi
            DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | jq -r '.assets[0].browser_download_url')
            curl -L -o input_video.mp4 "$DOWNLOAD_URL"
          fi
          
          if [ ! -f input_video.mp4 ]; then
            echo "Error: Video not downloaded!"
            exit 1
          fi
          echo "✅ Video: $(du -sh input_video.mp4 | cut -f1)"
      
      - name: Generate subtitle
        id: whisper
        run: |
          MODEL="${{ github.event.inputs.whisper_model }}"
          LANG="${{ github.event.inputs.language }}"
          
          if [ "$LANG" = "auto" ]; then
            whisper input_video.mp4 --model $MODEL --output_format srt --output_dir .
          else
            whisper input_video.mp4 --model $MODEL --language $LANG --output_format srt --output_dir .
          fi
          
          ORIGINAL_SRT=$(ls *.srt | head -n 1)
          echo "original_srt=$ORIGINAL_SRT" >> $GITHUB_OUTPUT
          echo "✅ Subtitle: $ORIGINAL_SRT"
      
      - name: Upload original subtitle
        uses: actions/upload-artifact@v4
        with:
          name: original-subtitle
          path: ${{ steps.whisper.outputs.original_srt }}
          retention-days: 30
      
      - name: Translate subtitle
        id: translate
        if: github.event.inputs.translate_to != 'none'
        continue-on-error: true
        run: |
          ORIGINAL="${{ steps.whisper.outputs.original_srt }}"
          TARGET="${{ github.event.inputs.translate_to }}"
          OUTPUT="translated_${TARGET}.srt"
          
          python3 << EOF
          import pysrt
          from deep_translator import GoogleTranslator
          
          subs = pysrt.open("$ORIGINAL")
          translator = GoogleTranslator(source='auto', target='$TARGET')
          
          for sub in subs:
              if sub.text and sub.text.strip():
                  try:
                      sub.text = translator.translate(sub.text)
                  except:
                      pass
          
          subs.save("$OUTPUT")
          EOF
          
          echo "translated_srt=$OUTPUT" >> $GITHUB_OUTPUT
      
      - name: Upload translated subtitle
        if: steps.translate.outputs.translated_srt != ''
        uses: actions/upload-artifact@v4
        with:
          name: translated-subtitle
          path: ${{ steps.translate.outputs.translated_srt }}
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: rm -f input_video.mp4          - 'large (خیلی کند - کیفیت فوق‌العاده)'
          - 'turbo (بهینه - سرعت و کیفیت خوب)'
      
      language_detection:
        description: 'زبان صدا'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto (تشخیص خودکار)'
          - 'English'
          - 'Persian'
          - 'Russian'
          - 'Spanish'
          - 'French'
          - 'German'
          - 'Japanese'
          - 'Korean'
          - 'Chinese'
      
      translate_to:
        description: 'ترجمه به'
        required: false
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'fa (فارسی)'
          - 'en (انگلیسی)'
          - 'es (اسپانیایی)'
          - 'fr (فرانسوی)'
          - 'de (آلمانی)'
      
      content_type:
        description: 'نوع محتوا (برای دقت بهتر)'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'rap_music'
          - 'anime'
          - 'movie'
          - 'documentary'

jobs:
  process-subtitle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ========== نصب FFmpeg ==========
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1
      
      # ========== نصب Whisper ==========
      - name: Install Whisper
        run: |
          pip install --upgrade pip
          pip install openai-whisper
          pip install pysrt deep-translator
      
      # ========== دانلود فیلم ==========
      - name: Download video
        id: download
        run: |
          if [ "${{ github.event.inputs.video_source }}" = "direct_url" ]; then
            echo "Downloading from direct URL..."
            curl -L -o input_video.mp4 "${{ github.event.inputs.direct_url }}"
          else
            echo "Downloading from GitHub Release..."
            if [ "${{ github.event.inputs.release_tag }}" = "latest" ]; then
              TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
            else
              TAG="${{ github.event.inputs.release_tag }}"
            fi
            DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | jq -r '.assets[0].browser_download_url')
            curl -L -o input_video.mp4 "$DOWNLOAD_URL"
          fi
          
          if [ ! -f input_video.mp4 ]; then
            echo "Error: Video not downloaded!"
            exit 1
          fi
          echo "✅ Video downloaded: $(du -sh input_video.mp4 | cut -f1)"
      
      # ========== تنظیم پرامپت بر اساس نوع محتوا ==========
      - name: Set prompt
        id: prompt
        run: |
          CONTENT="${{ github.event.inputs.content_type }}"
          if [ "$CONTENT" = "rap_music" ]; then
            PROMPT="Rap song with street slang, fast delivery, ad-libs. Transcribe exactly."
          elif [ "$CONTENT" = "anime" ]; then
            PROMPT="Anime dialogue with emotional expressions and honorifics."
          elif [ "$CONTENT" = "documentary" ]; then
            PROMPT="Documentary narration with formal and scientific terms."
          else
            PROMPT=""
          fi
          echo "prompt=$PROMPT" >> $GITHUB_OUTPUT
      
      # ========== استخراج نام مدل ==========
      - name: Extract model
        id: model
        run: |
          MODEL_INPUT="${{ github.event.inputs.whisper_model }}"
          MODEL=$(echo "$MODEL_INPUT" | cut -d' ' -f1)
          echo "model=$MODEL" >> $GITHUB_OUTPUT
      
      # ========== اجرای Whisper ==========
      - name: Generate subtitle
        id: whisper
        run: |
          MODEL="${{ steps.model.outputs.model }}"
          LANG_INPUT="${{ github.event.inputs.language_detection }}"
          PROMPT="${{ steps.prompt.outputs.prompt }}"
          
          if [ "$LANG_INPUT" = "auto (تشخیص خودکار)" ]; then
            if [ -n "$PROMPT" ]; then
              whisper input_video.mp4 --model $MODEL --prompt "$PROMPT" --output_format srt --output_dir .
            else
              whisper input_video.mp4 --model $MODEL --output_format srt --output_dir .
            fi
          else
            LANG=$(echo "$LANG_INPUT" | cut -d' ' -f1 | tr '[:upper:]' '[:lower:]')
            if [ -n "$PROMPT" ]; then
              whisper input_video.mp4 --model $MODEL --language $LANG --prompt "$PROMPT" --output_format srt --output_dir .
            else
              whisper input_video.mp4 --model $MODEL --language $LANG --output_format srt --output_dir .
            fi
          fi
          
          ORIGINAL_SRT=$(ls *.srt 2>/dev/null | grep -v "translated" | head -n 1)
          if [ -z "$ORIGINAL_SRT" ]; then
            echo "Error: No subtitle file generated!"
            exit 1
          fi
          
          echo "original_srt=$ORIGINAL_SRT" >> $GITHUB_OUTPUT
          echo "✅ Subtitle generated: $ORIGINAL_SRT"
          echo "--- Preview ---"
          head -n 15 "$ORIGINAL_SRT"
      
      # ========== آپلود فایل اصلی ==========
      - name: Upload original subtitle
        uses: actions/upload-artifact@v4
        with:
          name: original-subtitle
          path: ${{ steps.whisper.outputs.original_srt }}
          retention-days: 30
      
      # ========== ترجمه ==========
      - name: Translate subtitle
        id: translate
        if: github.event.inputs.translate_to != 'none'
        continue-on-error: true
        run: |
          ORIGINAL="${{ steps.whisper.outputs.original_srt }}"
          TARGET=$(echo "${{ github.event.inputs.translate_to }}" | cut -d' ' -f1)
          TRANSLATED_SRT="translated_${TARGET}.srt"
          
          python3 << EOF
          import pysrt
          from deep_translator import GoogleTranslator
          
          subs = pysrt.open("$ORIGINAL")
          translator = GoogleTranslator(source='auto', target='$TARGET')
          total = len(subs)
          
          for i, sub in enumerate(subs):
              if sub.text and sub.text.strip():
                  try:
                      translated = translator.translate(sub.text)
                      if translated:
                          sub.text = translated
                  except Exception as e:
                      print(f"Error line {i+1}: {e}")
              if (i+1) % 10 == 0:
                  print(f"Progress: {i+1}/{total}")
          
          subs.save("$TRANSLATED_SRT")
          print("✅ Translation completed")
          EOF
          
          if [ -f "$TRANSLATED_SRT" ]; then
            echo "translated_srt=$TRANSLATED_SRT" >> $GITHUB_OUTPUT
          fi
      
      # ========== آپلود فایل ترجمه شده ==========
      - name: Upload translated subtitle
        if: steps.translate.outputs.translated_srt != ''
        uses: actions/upload-artifact@v4
        with:
          name: translated-subtitle
          path: ${{ steps.translate.outputs.translated_srt }}
          retention-days: 30
      
      # ========== پاکسازی ==========
      - name: Cleanup
        if: always()
        run: |
          rm -f input_video.mp4
          rm -f *.wav 2>/dev/null || true
          echo "✅ Cleanup done"
      
      # ========== خلاصه ==========
      - name: Summary
        if: always()
        run: |
          echo "## ✅ Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Model | ${{ steps.model.outputs.model }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ github.event.inputs.language_detection }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Content Type | ${{ github.event.inputs.content_type }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Original | ✅ Saved |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.translate.outputs.translated_srt }}" != "" ]; then
            echo "| Translation | ✅ Saved |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download from Artifacts**" >> $GITHUB_STEP_SUMMARY
