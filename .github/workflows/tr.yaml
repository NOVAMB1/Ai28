name: Subtitle Generator with AI

on:
  workflow_dispatch:
    inputs:
      video_source:
        description: 'نحوه دریافت فیلم'
        required: true
        default: 'direct_url'
        type: choice
        options:
          - direct_url
          - github_release
      
      direct_url:
        description: 'لینک مستقیم فیلم'
        required: false
        type: string
        default: ''
      
      release_tag:
        description: 'تگ Release'
        required: false
        type: string
        default: 'latest'
      
      whisper_model:
        description: 'مدل Whisper'
        required: true
        default: 'base'
        type: choice
        options:
          - 'base'
          - 'small'
          - 'medium'
          - 'large-v3'
      
      language:
        description: 'زبان صدا (حتما انتخاب کنید)'
        required: true
        default: 'English'
        type: choice
        options:
          - 'English'
          - 'Persian'
          - 'Russian'
          - 'Spanish'
          - 'French'
          - 'German'
          - 'Japanese'
          - 'Korean'
          - 'Chinese'
      
      translate_to:
        description: 'ترجمه به فارسی؟'
        required: false
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'fa'
      
      output_format:
        description: 'فرمت خروجی'
        required: true
        default: 'srt'
        type: choice
        options:
          - 'srt'

jobs:
  process-subtitle:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # ========== نصب FFmpeg ==========
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -n 1
      
      # ========== نصب Whisper ==========
      - name: Install Whisper
        run: |
          pip install --upgrade pip
          pip install openai-whisper
          pip install pysrt deep-translator
      
      # ========== دانلود فیلم ==========
      - name: Download video
        id: download
        run: |
          if [ "${{ github.event.inputs.video_source }}" = "direct_url" ]; then
            echo "Downloading from direct URL..."
            curl -L -o input_video.mp4 "${{ github.event.inputs.direct_url }}"
          else
            echo "Downloading from GitHub Release..."
            if [ "${{ github.event.inputs.release_tag }}" = "latest" ]; then
              TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
            else
              TAG="${{ github.event.inputs.release_tag }}"
            fi
            DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | jq -r '.assets[0].browser_download_url')
            curl -L -o input_video.mp4 "$DOWNLOAD_URL"
          fi
          
          if [ ! -f input_video.mp4 ]; then
            echo "Error: Video not downloaded!"
            exit 1
          fi
          echo "✅ Video downloaded: $(du -sh input_video.mp4 | cut -f1)"
      
      # ========== اجرای Whisper با زبان مشخص ==========
      - name: Generate subtitle
        id: whisper
        run: |
          MODEL="${{ github.event.inputs.whisper_model }}"
          LANG="${{ github.event.inputs.language }}"
          
          echo "Using model: $MODEL, language: $LANG"
          
          whisper input_video.mp4 \
            --model $MODEL \
            --language $LANG \
            --output_format srt \
            --output_dir .
          
          ORIGINAL_SRT=$(ls *.srt 2>/dev/null | grep -v "translated" | head -n 1)
          
          if [ -z "$ORIGINAL_SRT" ]; then
            echo "Error: No subtitle file generated!"
            exit 1
          fi
          
          echo "original_srt=$ORIGINAL_SRT" >> $GITHUB_OUTPUT
          echo "✅ Subtitle generated: $ORIGINAL_SRT"
          
          # نمایش پیش‌نمایش
          echo "--- Preview ---"
          head -n 15 "$ORIGINAL_SRT"
      
      # ========== آپلود فایل اصلی (همیشه آپلود می‌شود) ==========
      - name: Upload original subtitle
        uses: actions/upload-artifact@v4
        with:
          name: original-subtitle
          path: ${{ steps.whisper.outputs.original_srt }}
          retention-days: 30
      
      # ========== ترجمه (اگر انتخاب شده باشد) ==========
      - name: Translate subtitle
        id: translate
        if: github.event.inputs.translate_to == 'fa'
        continue-on-error: true  # مهم: حتی اگر خطا بده، ادامه بده
        run: |
          ORIGINAL="${{ steps.whisper.outputs.original_srt }}"
          TRANSLATED_SRT="translated_fa.srt"
          
          echo "Translating to Persian..."
          
          python3 << 'EOF'
          import pysrt
          from deep_translator import GoogleTranslator
          
          input_file = "${{ steps.whisper.outputs.original_srt }}"
          output_file = "translated_fa.srt"
          
          subs = pysrt.open(input_file)
          print(f"Loaded {len(subs)} subtitles")
          
          translator = GoogleTranslator(source='auto', target='fa')
          
          for i, sub in enumerate(subs):
              if sub.text and sub.text.strip():
                  try:
                      translated = translator.translate(sub.text)
                      if translated:
                          sub.text = translated
                  except Exception as e:
                      print(f"Error line {i+1}: {e}")
              if (i+1) % 10 == 0:
                  print(f"Progress: {i+1}/{len(subs)}")
          
          subs.save(output_file)
          print(f"✅ Saved: {output_file}")
          EOF
          
          if [ -f translated_fa.srt ]; then
            echo "translated_srt=translated_fa.srt" >> $GITHUB_OUTPUT
            echo "✅ Translation completed"
          else
            echo "⚠️ Translation failed, but original subtitle is saved"
          fi
      
      # ========== آپلود فایل ترجمه شده (اگر ساخته شده باشد) ==========
      - name: Upload translated subtitle
        if: steps.translate.outputs.translated_srt != ''
        uses: actions/upload-artifact@v4
        with:
          name: translated-subtitle
          path: ${{ steps.translate.outputs.translated_srt }}
          retention-days: 30
      
      # ========== پاکسازی ==========
      - name: Cleanup
        if: always()
        run: |
          rm -f input_video.mp4
          rm -f *.wav 2>/dev/null || true
          echo "✅ Cleanup done"
      
      # ========== خلاصه نهایی ==========
      - name: Summary
        if: always()
        run: |
          echo "## ✅ Workflow Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Model | ${{ github.event.inputs.whisper_model }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ github.event.inputs.language }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Original Subtitle | ✅ Saved |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.translate.outputs.translated_srt }}" != "" ]; then
            echo "| Translated Subtitle | ✅ Saved |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.event.inputs.translate_to }}" == "fa" ]; then
            echo "| Translated Subtitle | ⚠️ Failed (original saved) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download from Artifacts below**" >> $GITHUB_STEP_SUMMARY
