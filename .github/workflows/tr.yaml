name: Subtitle Generator with AI

on:
  workflow_dispatch:
    inputs:
      video_source:
        description: 'نحوه دریافت فیلم'
        required: true
        default: 'direct_url'
        type: choice
        options:
          - direct_url
          - github_release
      
      direct_url:
        description: 'لینک مستقیم فیلم'
        required: false
        type: string
        default: ''
      
      release_tag:
        description: 'تگ Release (برای دانلود فیلم)'
        required: false
        type: string
        default: 'latest'
      
      whisper_model:
        description: 'مدل Whisper'
        required: true
        default: 'small'
        type: choice
        options:
          - 'tiny'
          - 'base'
          - 'small'
          - 'medium'
          - 'large'
          - 'turbo'
      
      language:
        description: 'زبان صدا'
        required: true
        default: 'auto'
        type: choice
        options:
          - 'auto'
          - 'en'
          - 'fa'
          - 'ru'
          - 'es'
          - 'fr'
          - 'de'
          - 'ja'
          - 'ko'
          - 'zh'
      
      translate_to:
        description: 'ترجمه به'
        required: false
        default: 'none'
        type: choice
        options:
          - 'none'
          - 'fa'
          - 'en'
          - 'es'
          - 'fr'
          - 'de'
      
      save_location:
        description: 'محل ذخیره زیرنویس'
        required: true
        default: 'artifact'
        type: choice
        options:
          - 'artifact (دانلود موقت)'
          - 'repository (کامیت به مخزن)'
          - 'release (آپلود به Release)'
      
      release_tag_output:
        description: 'تگ Release برای ذخیره (اگر save_location=release باشد)'
        required: false
        type: string
        default: 'subtitles'

jobs:
  process-subtitle:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # برای نوشتن در مخزن و Release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
      
      - name: Install Whisper
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet openai-whisper
          pip install --quiet pysrt deep-translator
      
      - name: Download video
        id: download
        run: |
          if [ "${{ github.event.inputs.video_source }}" = "direct_url" ]; then
            curl -L -o input_video.mp4 "${{ github.event.inputs.direct_url }}"
          else
            if [ "${{ github.event.inputs.release_tag }}" = "latest" ]; then
              TAG=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
            else
              TAG="${{ github.event.inputs.release_tag }}"
            fi
            DOWNLOAD_URL=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | jq -r '.assets[0].browser_download_url')
            curl -L -o input_video.mp4 "$DOWNLOAD_URL"
          fi
          
          if [ ! -f input_video.mp4 ]; then
            echo "Error: Video not downloaded!"
            exit 1
          fi
          echo "✅ Video: $(du -sh input_video.mp4 | cut -f1)"
      
      - name: Generate subtitle
        id: whisper
        run: |
          MODEL="${{ github.event.inputs.whisper_model }}"
          LANG="${{ github.event.inputs.language }}"
          
          if [ "$LANG" = "auto" ]; then
            whisper input_video.mp4 --model $MODEL --output_format srt --output_dir .
          else
            whisper input_video.mp4 --model $MODEL --language $LANG --output_format srt --output_dir .
          fi
          
          ORIGINAL_SRT=$(ls *.srt | grep -v "translated" | head -n 1)
          echo "original_srt=$ORIGINAL_SRT" >> $GITHUB_OUTPUT
          echo "✅ Subtitle: $ORIGINAL_SRT"
      
      - name: Translate subtitle
        id: translate
        if: github.event.inputs.translate_to != 'none'
        continue-on-error: true
        run: |
          ORIGINAL="${{ steps.whisper.outputs.original_srt }}"
          TARGET="${{ github.event.inputs.translate_to }}"
          OUTPUT="translated_${TARGET}.srt"
          
          python3 << EOF
          import pysrt
          from deep_translator import GoogleTranslator
          
          subs = pysrt.open("$ORIGINAL")
          translator = GoogleTranslator(source='auto', target='$TARGET')
          
          for sub in subs:
              if sub.text and sub.text.strip():
                  try:
                      sub.text = translator.translate(sub.text)
                  except:
                      pass
          
          subs.save("$OUTPUT")
          EOF
          
          echo "translated_srt=$OUTPUT" >> $GITHUB_OUTPUT
      
      # ========== ذخیره در Artifact ==========
      - name: Upload to Artifact
        if: contains(github.event.inputs.save_location, 'artifact')
        uses: actions/upload-artifact@v4
        with:
          name: subtitles
          path: |
            ${{ steps.whisper.outputs.original_srt }}
            ${{ steps.translate.outputs.translated_srt }}
          retention-days: 30
      
      # ========== ذخیره در Repository ==========
      - name: Save to Repository
        if: contains(github.event.inputs.save_location, 'repository')
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          mkdir -p subtitles
          cp "${{ steps.whisper.outputs.original_srt }}" subtitles/
          
          if [ -n "${{ steps.translate.outputs.translated_srt }}" ]; then
            cp "${{ steps.translate.outputs.translated_srt }}" subtitles/
          fi
          
          git add subtitles/
          git commit -m "Add subtitles [skip ci]" || echo "No changes"
          git push
          
          echo "✅ Saved to repository (subtitles/ folder)"
      
      # ========== ذخیره در Release ==========
      - name: Save to Release
        if: contains(github.event.inputs.save_location, 'release')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.release_tag_output }}"
          
          # ایجاد Release اگر وجود نداشته باشد
          gh release create "$TAG" --notes "Subtitles" --repo "${{ github.repository }}" || true
          
          # آپلود فایل‌ها
          gh release upload "$TAG" "${{ steps.whisper.outputs.original_srt }}" --repo "${{ github.repository }}" --clobber
          
          if [ -n "${{ steps.translate.outputs.translated_srt }}" ]; then
            gh release upload "$TAG" "${{ steps.translate.outputs.translated_srt }}" --repo "${{ github.repository }}" --clobber
          fi
          
          echo "✅ Saved to Release: $TAG"
      
      - name: Cleanup
        if: always()
        run: rm -f input_video.mp4
      
      - name: Summary
        if: always()
        run: |
          echo "## ✅ Done!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Model | ${{ github.event.inputs.whisper_model }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Language | ${{ github.event.inputs.language }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Save Location | ${{ github.event.inputs.save_location }} |" >> $GITHUB_STEP_SUMMARY
